name: erp-gob-suite

services:
  postgres:
    image: postgres:16
    container_name: erp-suite-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp}
      POSTGRES_DB: ${POSTGRES_DB:-erp}
      TZ: UTC
      PGTZ: UTC
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-erp} -d ${POSTGRES_DB:-erp}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7
    container_name: erp-suite-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: erp-suite-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
      MINIO_REGION: us-east-1
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: erp-suite-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
    ports:
      - "8080:8080"
    volumes:
      - ./docker/keycloak/realm-erp-dev.json:/opt/keycloak/data/import/realm-erp-dev.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend/core/backend
      dockerfile: Dockerfile
      target: deps
    container_name: erp-suite-backend
    working_dir: /usr/src/app
    command: >
      sh -c "npm ci &&
      npx prisma generate &&
      (npx prisma migrate deploy || (echo '[WARN] prisma migrate deploy failed; applying prisma db push' && npx prisma db push --accept-data-loss)) &&
      npx prisma db seed &&
      npm run start:dev"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp}:${POSTGRES_PASSWORD:-erp}@postgres:5432/${POSTGRES_DB:-erp}?schema=public
      POSTGRES_DB: ${POSTGRES_DB:-erp}
      POSTGRES_USER: ${POSTGRES_USER:-erp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      MINIO_BUCKET: erp-documentos
      MINIO_REGION: us-east-1
      MINIO_USE_SSL: "false"
      MINIO_PRESIGN_EXPIRES: "900"
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-erp}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_API_CLIENT_ID:-erp-api}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_API_CLIENT_SECRET:-change_me}
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/${KEYCLOAK_REALM:-erp},http://localhost:8080/realms/${KEYCLOAK_REALM:-erp}
      KEYCLOAK_AUDIENCE: account,${KEYCLOAK_API_CLIENT_ID:-erp-api}
      KEYCLOAK_SSL_REQUIRED: none
    ports:
      - "13000:3000"
    volumes:
      - ./backend/core/backend:/usr/src/app
      - backend_node_modules:/usr/src/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/ops/health').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: erp-suite-frontend
    working_dir: /app
    command: sh -lc "npm ci && npm run dev -- --hostname 0.0.0.0 --port 3001"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: http://backend:3000
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-erp}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-erp-frontend}
      KEYCLOAK_FALLBACK_CLIENT_ID: ${KEYCLOAK_API_CLIENT_ID:-erp-api}
      KEYCLOAK_FALLBACK_CLIENT_SECRET: ${KEYCLOAK_API_CLIENT_SECRET:-change_me}
      NEXT_PUBLIC_APP_ORIGIN: ${APP_URL:-http://localhost:13001}
      APP_ALLOWED_ORIGINS: ${APP_URL:-http://localhost:13001}
      FRONTEND_CSRF_MODE: ${FRONTEND_CSRF_MODE:-warn}
    ports:
      - "13001:3001"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started

volumes:
  pg_data:
  redis_data:
  minio_data:
  backend_node_modules:
  frontend_node_modules:
